name: flutter_copper_shader
description: "Integrate GLSL shader backgrounds for Flutter. Supports ShaderToy uniforms, textures & custom params. Impeller-ready, smooth performance."
version: 1.0.1
homepage: https://github.com/NeKoFu/flutter_copper_shader
license: MIT

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.1"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  shaders:
    - shaders/animated_gradient.frag
    - shaders/auroras.frag
    - shaders/clouds.frag
    - shaders/crystallize.frag
    - shaders/dark_matter.frag
    - shaders/dots_wave.frag
    - shaders/kaleidoscope.frag
    - shaders/lava_lamp.frag
    - shaders/metal_polygons.frag
    - shaders/ocean_gradient.frag
    - shaders/plasma.frag
    - shaders/quantum_particles.frag
    - shaders/retro_grid.frag
    - shaders/rhodium_liquid_carbon.frag
    - shaders/sparks.frag
    - shaders/starfield.frag
    - shaders/universe_within.frag
    - shaders/vapor_wave.frag
    - shaders/water_caustics.frag
    - shaders/zippy_zaps.frag

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
